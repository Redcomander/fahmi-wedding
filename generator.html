<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Generator - The Wedding of Adinda & Fahmi</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --primary-color: #8b6914;
        --secondary-color: #d4a574;
        --bg-color: #fdf9f1;
        --text-color: #4a3728;
        --white: #ffffff;
        --border-color: #e2d1b3;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .generator-container {
        background: var(--white);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(139, 105, 20, 0.1);
        max-width: 600px;
        width: 100%;
        border-top: 5px solid var(--primary-color);
      }

      h1 {
        font-family: "Playfair Display", serif;
        color: var(--primary-color);
        margin-bottom: 10px;
        text-align: center;
      }

      p.desc {
        text-align: center;
        margin-bottom: 30px;
        font-size: 14px;
        color: #666;
      }

      .form-group {
        margin-bottom: 25px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 15px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-family: "Poppins", sans-serif;
        font-size: 15px;
        transition: all 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(139, 105, 20, 0.1);
      }

      .result-box {
        background-color: var(--bg-color);
        border: 1px solid var(--border-color);
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        word-break: break-all;
        min-height: 60px;
        font-size: 14px;
        color: #555;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .result-text {
        flex: 1;
        margin-right: 15px;
      }

      .buttons {
        display: flex;
        gap: 15px;
      }

      button {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 8px;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-size: 15px;
      }

      .btn-primary {
        background-color: var(--primary-color);
        color: var(--white);
      }

      .btn-primary:hover {
        background-color: #715510;
      }

      .btn-outline {
        background-color: transparent;
        color: var(--primary-color);
        border: 1px solid var(--primary-color);
        text-decoration: none;
      }

      .btn-outline:hover {
        background-color: var(--bg-color);
      }

      .btn-copy-sm {
        flex: 0 0 auto;
        padding: 8px 15px;
        background-color: var(--secondary-color);
        color: white;
        border-radius: 5px;
        font-size: 13px;
      }

      .btn-copy-sm:hover {
        background-color: var(--primary-color);
      }

      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background-color: #28a745;
        color: white;
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: 500;
        opacity: 0;
        transition: all 0.4s ease;
        z-index: 1000;
        pointer-events: none;
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="generator-container">
      <h1>URL Generator</h1>
      <p class="desc">Buat link undangan khusus untuk setiap tamu</p>

      <div class="form-group">
        <label for="guestName">Nama Tamu & Gelar</label>
        <input
          type="text"
          id="guestName"
          placeholder="Contoh: Bapak Budi & Keluarga"
          autocomplete="off"
        />
      </div>

      <label>URL Undangan Otomatis:</label>
      <div class="result-box">
        <div class="result-text" id="resultUrl">
          https://example.com/index.html?to=
        </div>
        <button class="btn-copy-sm" id="btnCopyUrl">
          <i class="fa-regular fa-copy"></i>
        </button>
      </div>

      <div class="buttons">
        <button class="btn-primary" id="btnWhatsApp">
          <i class="fa-brands fa-whatsapp"></i> Bagikan WA
        </button>
        <a
          href="index.html"
          class="btn-outline"
          target="_blank"
          id="btnPreview"
        >
          <i class="fa-regular fa-eye"></i> Preview
        </a>
      </div>
    </div>

    <div id="toast">Berhasil disalin!</div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const guestNameInput = document.getElementById("guestName");
        const resultUrl = document.getElementById("resultUrl");
        const btnCopyUrl = document.getElementById("btnCopyUrl");
        const btnWhatsApp = document.getElementById("btnWhatsApp");
        const btnPreview = document.getElementById("btnPreview");
        const toast = document.getElementById("toast");

        // Base URL of your website (adjust if hosting on actual standard domain)
        const baseUrl =
          window.location.origin +
          window.location.pathname.replace("generator.html", "index.html");

        // Initial render
        resultUrl.textContent = baseUrl;

        // Event Listener for typing
        guestNameInput.addEventListener("input", (e) => {
          const name = e.target.value.trim();
          if (name) {
            // Convert spaces to '+' per URL standard
            const encodedName = encodeURIComponent(name).replace(/%20/g, "+");
            const generatedUrl = `${baseUrl}?to=${encodedName}`;
            resultUrl.textContent = generatedUrl;
            btnPreview.href = generatedUrl;
          } else {
            resultUrl.textContent = baseUrl;
            btnPreview.href = baseUrl;
          }
        });

        // Copy URL logic
        btnCopyUrl.addEventListener("click", () => {
          const url = resultUrl.textContent;
          navigator.clipboard.writeText(url).then(() => {
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
          });
        });

        // WhatsApp Message Template
        btnWhatsApp.addEventListener("click", () => {
          const name = guestNameInput.value.trim() || "Tamu Undangan";
          const url = resultUrl.textContent;

          const message = `Bismillahirahmanirrahim.
Assalamu'alaikum Warahmatullahi Wabarakatuh.

Kehadiran adalah ketulusan, dan doa adalah sebaik-baik hadiah. 
Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i untuk hadir dan memberikan doa restu pada acara pernikahan kami.

Yth. ${name}

Berikut link undangan untuk info lengkap mengenai acara pernikahan kami:
${url}

Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir di hari bahagia kami.

Terima kasih atas segala ucapan dan doa restunya.
Wassalamu'alaikum Warahmatullahi Wabarakatuh.

Hormat kami,
*Adinda & Fahmi*`;

          const encodedMessage = encodeURIComponent(message);
          window.open(
            `https://api.whatsapp.com/send?text=${encodedMessage}`,
            "_blank",
          );
        });
      });
    </script>
  </body>
</html>
