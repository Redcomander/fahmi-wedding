<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - The Wedding of Adinda & Fahmi</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --primary-color: #8b6914;
        --secondary-color: #d4a574;
        --bg-color: #fdf9f1;
        --text-color: #4a3728;
        --white: #ffffff;
        --border-color: #e2d1b3;
        --danger-color: #dc3545;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .admin-container {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(139, 105, 20, 0.1);
        max-width: 800px;
        width: 100%;
        border-top: 5px solid var(--primary-color);
        margin-top: 40px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
      }

      h1 {
        font-family: "Playfair Display", serif;
        color: var(--primary-color);
        font-size: 28px;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        font-size: 14px;
      }

      .btn-outline {
        background-color: transparent;
        color: var(--primary-color);
        border: 1px solid var(--primary-color);
      }

      .btn-outline:hover {
        background-color: var(--primary-color);
        color: var(--white);
      }

      .btn-danger {
        background-color: transparent;
        color: var(--danger-color);
        border: 1px solid var(--danger-color);
      }

      .btn-danger:hover {
        background-color: var(--danger-color);
        color: var(--white);
      }

      .stat-cards {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        flex: 1;
        background: var(--white);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        text-align: center;
      }

      .stat-num {
        display: block;
        font-size: 32px;
        font-weight: 700;
        color: var(--primary-color);
        font-family: "Playfair Display", serif;
      }

      .stat-label {
        font-size: 12px;
        text-transform: uppercase;
        color: #666;
        margin-top: 5px;
        display: block;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 20px;
        color: var(--text-color);
      }

      .comments-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .comment-item {
        background: var(--bg-color);
        padding: 20px;
        border-radius: 12px;
        border-left: 4px solid var(--primary-color);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .comment-content {
        flex: 1;
        margin-right: 20px;
      }

      .comment-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .comment-name {
        font-weight: 600;
        font-family: "Playfair Display", serif;
        font-size: 18px;
        color: var(--primary-color);
      }

      .comment-time {
        font-size: 11px;
        color: #888;
      }

      .comment-text {
        font-size: 14px;
        color: #555;
        line-height: 1.5;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #888;
        background: var(--bg-color);
        border-radius: 12px;
        border: 1px dashed var(--border-color);
      }

      /* Login Overlay */
      #login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(253, 249, 241, 0.95);
        backdrop-filter: blur(10px);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-box {
        background: var(--white);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(139, 105, 20, 0.1);
        text-align: center;
        max-width: 400px;
        width: 90%;
        border-top: 5px solid var(--primary-color);
      }

      .login-box h2 {
        font-family: "Playfair Display", serif;
        color: var(--primary-color);
      }

      .login-box input {
        width: 100%;
        padding: 15px;
        margin: 20px 0;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-family: "Poppins", sans-serif;
      }

      .login-box button {
        width: 100%;
        background-color: var(--primary-color);
        color: var(--white);
        padding: 15px;
        border: none;
        border-radius: 8px;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        cursor: pointer;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Login Protection -->
    <div id="login-overlay">
      <div class="login-box">
        <i
          class="fa-solid fa-lock"
          style="
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 15px;
          "
        ></i>
        <h2>Admin Login</h2>
        <p style="font-size: 13px; color: #666; margin-top: 5px">
          Silakan masukkan password untuk mengelola komentar.
        </p>
        <input type="password" id="admin-pass" placeholder="Password..." />
        <button id="btn-login">Masuk</button>
        <a
          href="index.html"
          style="display: block; margin-top: 15px; font-size: 13px; color: #999"
          >Kembali ke Undangan</a
        >
      </div>
    </div>

    <!-- Main Dashboard -->
    <div class="admin-container hidden" id="admin-dashboard">
      <div class="header">
        <h1><i class="fa-solid fa-clipboard-list"></i> Manajemen Undangan</h1>
        <div class="actions">
          <a href="index.html" class="btn btn-outline" target="_blank"
            ><i class="fa-solid fa-eye"></i> Lihat Web</a
          >
          <button class="btn btn-outline" id="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> Keluar
          </button>
        </div>
      </div>

      <div class="stat-cards">
        <div class="stat-card">
          <span class="stat-num" id="stat-hadir">0</span>
          <span class="stat-label">Hadir</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-tidak">0</span>
          <span class="stat-label">Tidak Hadir</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-ragu">0</span>
          <span class="stat-label">Ragu</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-comments">0</span>
          <span class="stat-label">Ucapan</span>
        </div>
      </div>

      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        "
      >
        <h2>Daftar Ucapan & Doa</h2>
        <button
          class="btn btn-danger"
          id="btn-clear-all"
          style="font-size: 12px; padding: 6px 12px"
        >
          <i class="fa-solid fa-triangle-exclamation"></i> Hapus Semua Data
        </button>
      </div>

      <div class="comments-list" id="comments-list">
        <!-- Comments will be injected here -->
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Login Logic
        const loginOverlay = document.getElementById("login-overlay");
        const dashboard = document.getElementById("admin-dashboard");
        const btnLogin = document.getElementById("btn-login");
        const inputPass = document.getElementById("admin-pass");
        const btnLogout = document.getElementById("btn-logout");

        const checkLogin = () => {
          const pass = inputPass.value;
          if (pass === "admin123") {
            loginOverlay.classList.add("hidden");
            dashboard.classList.remove("hidden");
            loadData();
          } else {
            alert("Password salah!");
          }
        };

        btnLogin.addEventListener("click", checkLogin);
        inputPass.addEventListener("keypress", (e) => {
          if (e.key === "Enter") checkLogin();
        });

        btnLogout.addEventListener("click", () => {
          inputPass.value = "";
          loginOverlay.classList.remove("hidden");
          dashboard.classList.add("hidden");
        });

        // Data Management Logic
        const commentsList = document.getElementById("comments-list");

        const loadData = () => {
          // 1. Calculate RSVP Stats
          const rsvps = JSON.parse(
            localStorage.getItem("wedding-rsvps") || "[]",
          );
          let hadir = 0,
            tidakHadir = 0,
            ragu = 0;

          rsvps.forEach((r) => {
            if (r.attendance === "Hadir") hadir += r.guests;
            else if (r.attendance === "Tidak Hadir") tidakHadir++;
            else ragu++;
          });

          document.getElementById("stat-hadir").textContent = hadir;
          document.getElementById("stat-tidak").textContent = tidakHadir;
          document.getElementById("stat-ragu").textContent = ragu;

          // 2. Load Comments
          const wishes = JSON.parse(
            localStorage.getItem("wedding-wishes") || "[]",
          );
          document.getElementById("stat-comments").textContent = wishes.length;

          commentsList.innerHTML = "";

          if (wishes.length === 0) {
            commentsList.innerHTML =
              '<div class="empty-state">Belum ada ucapan yang tersimpan.</div>';
            return;
          }

          wishes.forEach((wish) => {
            // Ensure every wish has an ID for deletion
            const id = wish.id || Math.floor(Math.random() * 1000000);

            const div = document.createElement("div");
            div.className = "comment-item";
            div.innerHTML = `
                        <div class="comment-content">
                            <div class="comment-header">
                                <span class="comment-name">${wish.name}</span>
                                <span class="comment-time">${wish.time}</span>
                            </div>
                            <div class="comment-text">${wish.message}</div>
                        </div>
                        <button class="btn btn-danger" onclick="deleteComment(${id})">
                            <i class="fa-solid fa-trash"></i> Hapus
                        </button>
                    `;
            commentsList.appendChild(div);
          });
        };

        // Delete Single Comment globally exposed
        window.deleteComment = function (id) {
          if (
            confirm(
              "Yakin ingin menghapus ucapan ini? Tindakan ini tidak dapat dibatalkan.",
            )
          ) {
            let wishes = JSON.parse(
              localStorage.getItem("wedding-wishes") || "[]",
            );
            wishes = wishes.filter((w) => w.id !== id);
            localStorage.setItem("wedding-wishes", JSON.stringify(wishes));
            loadData(); // Re-render
          }
        };

        // Clear all data (Reset Server memory)
        document
          .getElementById("btn-clear-all")
          .addEventListener("click", () => {
            if (
              confirm(
                "PERINGATAN KERAS!\n\nApakah Anda yakin ingin menghapus SEMUA ucapan dan data kehadiran RSVP? Data yang dihapus tidak bisa dikembalikan!",
              )
            ) {
              localStorage.removeItem("wedding-wishes");
              localStorage.removeItem("wedding-rsvps");
              alert("Semua data berhasil direset.");
              loadData();
            }
          });
      });
    </script>
  </body>
</html>
